openapi: 3.1.0
info:
  title: Hotel Call Center Chat API
  version: 0.3.0
  description: Phase 1 REST API와 Phase 2 Socket.IO 이벤트 계약입니다.
servers:
  - url: http://localhost:4000/api
paths:
  /health:
    get:
      summary: 서버 상태 확인
      responses:
        "200": { description: 정상 }
  /auth/login:
    post:
      summary: 관리자·Agent 통합 로그인과 역할 판별
      requestBody: { $ref: "#/components/requestBodies/Login" }
      responses:
        "201": { description: 직원 JWT와 ADMIN 또는 AGENT 역할 발급 }
        "401": { description: 로그인 실패 }
  /auth/change-password:
    post:
      summary: 로그인한 직원의 비밀번호 변경과 기존 토큰 폐기
      security: [{ bearerAuth: [] }]
      requestBody: { $ref: "#/components/requestBodies/ChangePassword" }
      responses:
        "201": { description: 변경 성공, 재로그인 필요 }
        "400": { description: 현재 비밀번호 오류 또는 새 비밀번호가 기존과 같음 }
        "401": { description: 직원 인증 실패 }
  /auth/agent/login:
    post:
      deprecated: true
      summary: 구버전 Agent 로그인
      requestBody: { $ref: "#/components/requestBodies/Login" }
      responses:
        "201": { description: Agent JWT 발급 }
        "401": { description: 로그인 실패 }
  /auth/admin/login:
    post:
      deprecated: true
      summary: 구버전 관리자 로그인
      requestBody: { $ref: "#/components/requestBodies/Login" }
      responses:
        "201": { description: 관리자 JWT 발급 }
        "401": { description: 로그인 실패 }
  /guest/access/verify:
    post:
      summary: 룸 접근 키 검증
      responses:
        "201": { description: 상담 생성용 단기 JWT와 룸 정보 }
        "401": { description: 키가 잘못되었거나 만료됨 }
  /chat-sessions:
    post:
      summary: expiresAt 없는 WAITING 상담과 호텔 SYSTEM 안내문 생성
      security: [{ bearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                language: { type: string, enum: [ja, en, ko, zh], default: ja }
      responses:
        "201": { description: nullable expiresAt 상담과 투숙객 불투명 토큰 }
        "409": { description: 동일 룸에 진행 가능한 상담 존재 }
  /chat-sessions/{sessionId}:
    get:
      summary: 상담 상세 조회
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200": { description: 상담 상세 }
        "401": { description: 조회 권한 없음 }
  /chat-sessions/{sessionId}/messages:
    get:
      summary: 저장된 메시지 조회
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200": { description: 생성 시각 순 메시지 목록 }
  /chat-sessions/{sessionId}/close:
    post:
      summary: 담당 Agent 또는 관리자의 상담 종료
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "201": { description: CLOSED 상담 }
        "403": { description: 담당 상담이 아님 }
  /agent/chat-sessions:
    get:
      summary: 마지막 활동 시각 내림차순 상담 목록 조회
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [WAITING, ACTIVE, CLOSED, EXPIRED, CANCELLED, BLOCKED] }
        - name: scope
          in: query
          description: 5초 폴링용 열린 상담과 저주기 공동 완료 로그를 분리하며 status가 있으면 status를 우선 적용
          schema: { type: string, enum: [OPEN, COMPLETED] }
      responses:
        "200": { description: 각 상담에 lastActivityAt과 최소 담당자 정보(id, name)를 포함하며 인증·토큰 내부값은 제외한 최근 활동순 목록 }
  /agent/chat-sessions/{sessionId}/accept:
    post:
      deprecated: true
      summary: 구버전 Agent 수락 호환 경로(대화 열기와 같은 정책)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "201": { description: ACTIVE 상담 }
        "409": { description: 이미 다른 Agent가 대화를 엶 }
  /agent/chat-sessions/{sessionId}/open:
    post:
      summary: WAITING 대화 열기·Agent 원자 배정(15분은 첫 Agent 메시지 저장 시 시작)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "201": { description: startedAt과 expiresAt이 설정된 ACTIVE 상담 }
        "409": { description: 이미 다른 Agent가 대화를 엶 }
  /admin/hotels/{hotelId}/welcome-message:
    patch:
      summary: 호텔별 일본어 또는 영어 Guest 첫 자동 안내문 수정
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: 수정된 호텔 }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema: { type: string, format: uuid }
  requestBodies:
    ChangePassword:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [currentPassword, newPassword]
            properties:
              currentPassword: { type: string, format: password }
              newPassword: { type: string, format: password }
    Login:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [loginId, password]
            properties:
              loginId: { type: string }
              password: { type: string, format: password }

# Socket.IO는 `/chat` 네임스페이스를 사용합니다.
# 직원은 handshake.auth.staffToken, 투숙객은 guestToken과 sessionId로 연결 인증합니다.
x-websocket:
  namespace: /chat
  authentication:
    staff: { auth: { staffToken: "Agent JWT" } }
    guest: { auth: { guestToken: "opaque token", sessionId: "uuid" } }
  clientEvents:
    chat:join:
      payload: { sessionId: "uuid" }
      result: { ok: true, sessionId: "uuid" }
    chat:message:
      payload: { sessionId: "uuid", clientMessageId: "uuid", content: "1..1000 chars" }
  serverEvents:
    chat:message-accepted: "DB 저장이 완료된 송신자 승인 메시지"
    chat:message: "상대방에게 전달되는 저장 완료 메시지"
    chat:session-updated: "WAITING에서 ACTIVE로 변경된 상담"
    chat:session-closed: "CLOSED 또는 EXPIRED 상담"
    chat:error: "내부 정보를 제거한 오류"
