services:
  - type: web
    name: remoteplus-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: >-
      pnpm install --prod=false --frozen-lockfile && pnpm --filter @hotel-chat/shared build && pnpm --filter @hotel-chat/server prisma:generate && pnpm --filter @hotel-chat/server build
    startCommand: >-
      pnpm --filter @hotel-chat/server prisma:migrate:deploy && pnpm --filter @hotel-chat/server start:prod
    initialDeployHook: pnpm --filter @hotel-chat/server prisma:seed
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24.14.1
      - key: DATABASE_URL
        fromDatabase:
          name: remoteplus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_KEY_ENCRYPTION_SECRET
        generateValue: true
      - key: WEB_ORIGINS
        sync: false
      - key: GUEST_PUBLIC_URL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        value: admin
      - key: SEED_AGENT_PASSWORD
        value: agent01
      - key: ALLOW_INSECURE_TEST_PASSWORDS
        value: "true"
      - key: SEED_RESET_EXISTING_PASSWORDS
        value: "false"
      - key: SEED_ROOM_ACCESS_KEY
        sync: false
      - key: SEED_SECOND_ROOM_ACCESS_KEY
        sync: false

databases:
  - name: remoteplus-db
    databaseName: hotel_chat
    user: hotel_chat
    region: singapore
    plan: free
    postgresMajorVersion: "17"
